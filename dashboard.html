<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWR Dashboard</title>
  <link rel="stylesheet" href="Style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .grid-charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .routine-days { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
    .day-btn { padding: 10px 20px; background: #2a2a2a; border: 1px solid #c581ff; color: white; cursor: pointer; border-radius: 5px; }
    .day-btn:hover { background: #c581ff; }
    table { border-collapse: collapse; margin-top: 10px; width: 100%; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
    th { color: #c581ff; }
    
    /* Estilos Formulario */
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #c581ff; font-weight: bold; }
    select, input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
    .weight-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
    .weight-btn { padding: 8px; background: #333; border: 1px solid #c581ff; color: white; cursor: pointer; border-radius: 3px; font-size: 12px; }
    .weight-btn:hover { background: #c581ff; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>PWR</h2>
  <a href="#" onclick="showSection('dashboard')">Dashboard</a>
  <a href="#" onclick="showSection('workouts')">Historial</a>
  <a href="#" onclick="showSection('routine')">Rutina</a>
  <a href="#" onclick="logout()">Cerrar Sesión</a>
</div>

<div class="main">
  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section">
    <h1>Progreso SBD</h1>
    <div class="grid-charts">
      <div class="card"><h3>Squat</h3><canvas id="sqChart"></canvas></div>
      <div class="card"><h3>Bench</h3><canvas id="bpChart"></canvas></div>
      <div class="card"><h3>Deadlift</h3><canvas id="dlChart"></canvas></div>
    </div>

    <div class="card">
      <h3>Registrar Entrenamiento</h3>
      
      <div class="form-group">
        <label>Día de la semana</label>
        <select id="workoutDay" onchange="updateExercises()">
          <option value="">-- Selecciona Día --</option>
          <option value="Lunes">Lunes</option>
          <option value="Martes">Martes</option>
          <option value="Jueves">Jueves</option>
          <option value="Viernes">Viernes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Ejercicio</label>
        <select id="workoutEx">
          <option value="">-- Selecciona Día Primero --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Peso (kg)</label>
        <input type="number" id="workoutWeight" placeholder="0" step="0.5">
        <div class="weight-btns">
          <button class="weight-btn" onclick="addWeight(2.5)">+2.5</button>
          <button class="weight-btn" onclick="addWeight(5)">+5</button>
          <button class="weight-btn" onclick="addWeight(10)">+10</button>
          <button class="weight-btn" onclick="addWeight(15)">+15</button>
          <button class="weight-btn" onclick="addWeight(20)">+20</button>
        </div>
      </div>

      <div class="form-group">
        <label>Repeticiones</label>
        <input type="number" id="workoutReps" placeholder="0">
      </div>

      <button onclick="saveWorkout()" style="width:100%; margin-top:10px;">Guardar Registro</button>
    </div>
  </div>

  <!-- HISTORY SECTION -->
  <div id="workouts-section" style="display:none;">
    <h1>Historial de Entrenos</h1>
    <div id="workoutList"><p>Cargando entrenos...</p></div>
  </div>

  <!-- ROUTINE SECTION -->
  <div id="routine-section" style="display:none;">
    <h1>Mi Rutina</h1>
    <div class="routine-days">
      <button class="day-btn" onclick="loadRoutine('Lunes')">Lunes</button>
      <button class="day-btn" onclick="loadRoutine('Martes')">Martes</button>
      <button class="day-btn" onclick="loadRoutine('Jueves')">Jueves</button>
      <button class="day-btn" onclick="loadRoutine('Viernes')">Viernes</button>
    </div>
    <div class="card" id="routineContent"><p>Selecciona un día para ver la rutina.</p></div>
  </div>
</div>

<script>
  function showSection(sectionId) {
    document.getElementById('dashboard-section').style.display = sectionId === 'dashboard' ? 'block' : 'none';
    document.getElementById('workouts-section').style.display = sectionId === 'workouts' ? 'block' : 'none';
    document.getElementById('routine-section').style.display = sectionId === 'routine' ? 'block' : 'none';
  }
</script>
<script type="module" src="App.js"></script>

</body>
</html>
