<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PWR Tracker</title>
  <link rel="stylesheet" href="Style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main">
  <!-- DASHBOARD -->
  <div id="dashboard-section">
    <h1>Progreso <span class="text-accent">SBD</span></h1>
    
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h3 style="color:var(--text-primary)">Squat</h3>
        <span class="text-accent" style="font-weight:700">KG</span>
      </div>
      <div class="chart-container"><canvas id="sqChart"></canvas></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h3 style="color:var(--text-primary)">Bench</h3>
        <span class="text-accent" style="font-weight:700">KG</span>
      </div>
      <div class="chart-container"><canvas id="bpChart"></canvas></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h3 style="color:var(--text-primary)">Deadlift</h3>
        <span class="text-accent" style="font-weight:700">KG</span>
      </div>
      <div class="chart-container"><canvas id="dlChart"></canvas></div>
    </div>

    <div class="card">
      <h2 style="margin-bottom:20px; color:var(--text-primary)">Registrar Serie</h2>
      <div class="form-group">
        <label>Día y Ejercicio</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
          <select id="workoutDay" onchange="updateExercises()">
            <option value="">Día</option>
            <option value="Lunes">Lunes</option>
            <option value="Martes">Martes</option>
            <option value="Jueves">Jueves</option>
            <option value="Viernes">Viernes</option>
          </select>
          <select id="workoutEx"><option value="">Ejercicio</option></select>
        </div>
      </div>

      <div class="form-group">
        <label>Peso (kg) <span onclick="calculatePlates()" style="cursor:pointer; font-size:18px">💿</span></label>
        <input type="number" id="workoutWeight" placeholder="0.0" step="0.5">
        <div class="weight-controls">
          <button class="weight-btn" onclick="addWeight(2.5)">+2.5</button>
          <button class="weight-btn" onclick="addWeight(5)">+5</button>
          <button class="weight-btn" onclick="addWeight(10)">+10</button>
          <button class="weight-btn" onclick="addWeight(20)">+20</button>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
        <div class="form-group">
          <label>Reps</label>
          <input type="number" id="workoutReps" placeholder="0">
        </div>
        <div class="form-group">
          <label>RPE</label>
          <input type="number" id="workoutRPE" placeholder="8.5" step="0.5">
        </div>
      </div>

      <button class="btn-primary" onclick="saveWorkout()">Guardar Registro</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="workouts-section" style="display:none">
    <h1>Historial</h1>
    <div id="workoutList"></div>
  </div>

  <!-- ROUTINE -->
  <div id="routine-section" style="display:none">
    <h1>Rutina</h1>
    <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:25px">
      <button class="weight-btn" onclick="loadRoutine('Lunes')">L</button>
      <button class="weight-btn" onclick="loadRoutine('Martes')">M</button>
      <button class="weight-btn" onclick="loadRoutine('Jueves')">J</button>
      <button class="weight-btn" onclick="loadRoutine('Viernes')">V</button>
    </div>
    <div class="card" id="routineContent">
      <p style="color:var(--text-secondary); text-align:center">Selecciona un día para ver tu rutina.</p>
    </div>
    <button class="btn-primary" onclick="logout()" style="background:#ff3b30; margin-top:30px; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.2)">Cerrar Sesión</button>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar glass">
  <div class="tab-item active" onclick="showSection('dashboard')">
    <span class="tab-icon">📊</span>
    <span>Progreso</span>
  </div>
  <div class="tab-item" onclick="showSection('workouts')">
    <span class="tab-icon">🕒</span>
    <span>Historial</span>
  </div>
  <div class="tab-item" onclick="showSection('routine')">
    <span class="tab-icon">📋</span>
    <span>Rutina</span>
  </div>
</div>

<script type="module" src="App.js"></script>

</body>
</html>
